# =============================================================================
# LazyDNS Configuration (converted from mosdns-x)
# Architecture: Clean DNS, ECS CDN, Domain Routing with Memory Cache
# Original: dns.bibica.net
# =============================================================================
#
# MIGRATION NOTES:
#   1. `data_providers` → replaced by `domain_set` / `ip_set` plugins
#   2. `query_matcher` / `response_matcher` → inline matchers in sequence rules
#   3. `fast_forward` → `forward` plugin
#   4. `servers:` block → individual server plugins (udp_server, tcp_server, etc.)
#   5. `api:` → `admin:` block
#   6. Cache args: lazy_cache_ttl → cache_ttl, lazy_cache_reply_ttl → no direct
#      equivalent (lazydns serves stale for `cache_ttl` seconds total)
#   7. `_new_nxdomain_response` → `reject 3`  (NXDOMAIN rcode)
#   8. `_return` → `return`
#   9. `_limit_2_ips` / `_no_cname` → NOT natively available in lazydns.
#      Remove or implement via a custom plugin.
#  10. `dynamic_domain_collector` → NOT available in lazydns. Remove or replace
#      with a custom side-effect plugin.
#  11. `redirect` rules file → lazydns `redirect` only supports INLINE rules.
#      Move your redirect_rules.txt entries directly into the `rules:` list below,
#      or replace with a `hosts` plugin for local overrides.
#  12. Server-level flags (block_ptr, block_https, block_no_dot, strip_edns0)
#      have no equivalent in lazydns server plugins — they are implemented as
#      sequence rules in PHASE 0 below.
#  13. DoH3/H3 (HTTP/3) listener → no direct lazydns equivalent; omitted.
#      The `doq_server` (DNS-over-QUIC) is the closest alternative.
# =============================================================================

# ============================================================================
# LOGGING
# ============================================================================
log:
  level: error
  console: true
  file:
    enabled: true
    path: "log/lazydns.log"
    rotation:
      type: never

# ============================================================================
# ADMIN API  (mosdns-x: api.http → lazydns: admin.addr)
# ============================================================================
admin:
  enabled: true
  addr: "127.0.0.1:9080"

# ============================================================================
# PLUGINS
# ============================================================================
plugins:

  # ==========================================================================
  # DOMAIN SETS  (replaces mosdns-x data_providers + query_matcher domain)
  # ==========================================================================

  - tag: domain_list_private_tlds
    type: domain_set
    args:
      files:
        - "rules/private_tlds.txt"
      auto_reload: true

  - tag: cdn_domains
    type: domain_set
    args:
      files:
        - "rules/cdn_domains.txt"
      auto_reload: true

  - tag: google_domains
    type: domain_set
    args:
      files:
        - "rules/google_upstream.txt"
      auto_reload: true

  - tag: mullvad_domains
    type: domain_set
    args:
      files:
        - "rules/mullvad_upstream.txt"
      auto_reload: true

  - tag: allowlist_domains
    type: domain_set
    args:
      files:
        - "rules/allowlists.txt"
      auto_reload: true

  - tag: blocklist_domains
    type: domain_set
    args:
      files:
        - "rules/blocklists.txt"
      auto_reload: true

  # ==========================================================================
  # IP SETS  (replaces mosdns-x data_providers + response_matcher ip)
  # ==========================================================================

  - tag: cloudfront_ips
    type: ip_set
    args:
      files:
        - "rules/cloudfront_ips.txt"
      auto_reload: true

  - tag: fastly_ips
    type: ip_set
    args:
      files:
        - "rules/fastly_ips.txt"
      auto_reload: true

  - tag: bunnycdn_ips
    type: ip_set
    args:
      files:
        - "rules/bunnycdn_ips.txt"
      auto_reload: true

  - tag: gcore_ips
    type: ip_set
    args:
      files:
        - "rules/gcore_ips.txt"
      auto_reload: true

  # ==========================================================================
  # RESPONSE MODIFIERS
  # ==========================================================================

  # Ad-blocking: return NULL IP 0.0.0.0 for A queries
  - tag: black_hole
    type: blackhole
    args:
      ips:
        - "0.0.0.0"

  # ECS: derive client subnet from client IP and attach to upstream queries
  # (mosdns-x: ecs auto:true force_overwrite:true → lazydns: send:true)
  - tag: ecs_handler
    type: ecs
    args:
      send: true
      mask4: 24
      mask6: 48

  # DNS rewrites
  # ⚠ IMPORTANT: lazydns `redirect` only supports INLINE rules.
  # Copy entries from rules/redirect_rules.txt into the `rules:` list below,
  # using the format "from.domain.com to.domain.com" (one string per rule).
  - tag: dns_redirect
    type: redirect
    args:
      rules:
        # TikTok
        - "v19-webapp-prime.tiktok.com v16-webapp-prime.tiktok.com"
        - "v16-webapp-prime.tiktok.com v16-webapp-prime.tiktok.com.bytegeo.akadns.net"
        # Bilibili web
        - "www.bilibili.tv www.bilibili.tv.w.cdngslb.com"
        # Bilibili video mirrors
        - "upos-sz-mirrorcos.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirrorcosb.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirrorbos.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirrorhw.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirrorhwb.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-upcdnbda2.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-upcdnws.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirrorali.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirroraliov.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirror08h.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        - "upos-sz-mirrorcosov.bilivideo.com upos-hz-mirrorakam.akamaized.net"
        # Medium
        - "medium.com rocket.net"
        # Pornhub
        - "pornhub.com www.pornhub.com"
        # Apple
        - "www.apple.com e6858.dsce9.akamaiedge.net"
        # Amazon
        - "www.amazon.com www.amazon.com.edgekey.net"
        # Ebay
        - "www.ebay.com e88167.a.akamaiedge.net"
        # Douyin / zjcdn
        - "v3-dy-o.zjcdn.com v3-dy-o.zjcdn.com.queniusy.com"
        # Shopee
        - "deo.shopeemobile.com deo.shopeemobile.com-v1.edgesuite.net"
        - "cf.shopee.vn cf.shopee.vn.akamaized.net"

  # TTL clamp (commented out in original; kept for reference)
  # - tag: ttl_short
  #   type: ttl
  #   args:
  #     ttl: 300   # Use exec quick-setup: "ttl:60-300" for range clamping

  # ==========================================================================
  # MEMORY CACHES
  # mosdns-x lazy_cache_ttl → cache_ttl (stale-serve window in lazydns)
  # mosdns-x lazy_cache_reply_ttl / cleaner_interval → no direct equivalent
  # ==========================================================================

  # Google cache (ECS-aware)
  - tag: google_cache
    type: cache
    args:
      size: 199680
      enable_lazycache: true
      lazycache_threshold: 0.05
      cache_ttl: 259200       # serve stale up to 3 days while refreshing

  # CDN direct cache (ECS-aware)
  - tag: cdn_direct_cache
    type: cache
    args:
      size: 133120
      enable_lazycache: true
      lazycache_threshold: 0.05
      cache_ttl: 259200

  # CDN CNAME cache (ECS-aware)
  - tag: cdn_cname_cache
    type: cache
    args:
      size: 133120
      enable_lazycache: true
      lazycache_threshold: 0.05
      cache_ttl: 259200

  # Mullvad cache (no ECS)
  - tag: mullvad_cache
    type: cache
    args:
      size: 1024
      enable_lazycache: true
      lazycache_threshold: 0.05
      cache_ttl: 259200

  # Cloudflare cache (no ECS, default path)
  - tag: cloudflare_cache
    type: cache
    args:
      size: 399360
      enable_lazycache: true
      lazycache_threshold: 0.05
      cache_ttl: 259200

  # ==========================================================================
  # UPSTREAM RESOLVERS  (mosdns-x fast_forward → lazydns forward)
  # ==========================================================================

  - tag: upstream_google
    type: forward
    args:
      upstreams:
        - "https://8.8.8.8/dns-query"
        - "https://8.8.4.4/dns-query"
      strategy: fastest
      health_checks: true

  - tag: upstream_cloudflare
    type: forward
    args:
      upstreams:
        - "https://1.1.1.1/dns-query"
        - "https://1.0.0.1/dns-query"
      strategy: fastest
      health_checks: true

  - tag: upstream_cloudflare_gateway
    type: forward
    args:
      upstreams:
        - "https://bu0eg1tdzu.cloudflare-gateway.com/dns-query"
        - "https://rhpcv957tj.cloudflare-gateway.com/dns-query"
      strategy: fastest
      health_checks: true

  - tag: upstream_mullvad
    type: forward
    args:
      upstreams:
        - "https://dns.mullvad.net/dns-query"

  # ==========================================================================
  # HANDLER SUB-SEQUENCES
  # These are invoked via `jump` from main so control returns after completion.
  # ==========================================================================

  # Google domains handler
  - tag: handle_google
    type: sequence
    args:
      rules:
        # Add ECS only for non-localhost clients
        - matches:
            - "!client_ip 127.0.0.0/8"
          exec: ecs_handler
        - exec: google_cache
        - exec: upstream_google
        # Retry once on SERVFAIL
        - matches:
            - rcode 2
          exec: upstream_google
        # If still SERVFAIL after retry, give up and return as-is
        - matches:
            - rcode 2
          exec: return
        # NOTE: _limit_2_ips and _no_cname are not available in lazydns.
        # Add a custom plugin here if IP limiting / CNAME stripping is needed.
        - exec: return

  # CDN direct domains handler (by domain name match)
  - tag: handle_cdn_direct
    type: sequence
    args:
      rules:
        - exec: ecs_handler
        - exec: cdn_direct_cache
        - exec: upstream_cloudflare_gateway
        - matches:
            - rcode 2
          exec: upstream_cloudflare_gateway
        - matches:
            - rcode 2
          exec: return
        # NOTE: _limit_2_ips and _no_cname not available; add custom plugin if needed.
        - exec: return

  # Mullvad domains handler
  - tag: handle_mullvad
    type: sequence
    args:
      rules:
        - exec: mullvad_cache
        - exec: upstream_mullvad
        - matches:
            - rcode 2
          exec: upstream_mullvad
        - matches:
            - rcode 2
          exec: return
        # NOTE: _limit_2_ips and _no_cname not available; add custom plugin if needed.
        - exec: return

  # CDN CNAME re-resolution handler (triggered after CDN CNAME/IP detected)
  - tag: handle_cdn_cname
    type: sequence
    args:
      rules:
        - exec: ecs_handler
        - exec: cdn_cname_cache
        - exec: upstream_cloudflare_gateway
        - matches:
            - rcode 2
          exec: upstream_cloudflare_gateway
        - matches:
            - rcode 2
          exec: return
        # NOTE: cdn_list_exporter (dynamic_domain_collector) is NOT available in
        # lazydns. Remove this step or implement via a custom plugin.
        # NOTE: _limit_2_ips and _no_cname not available; add custom plugin if needed.
        - exec: return

  # ==========================================================================
  # MAIN SEQUENCE
  # ==========================================================================

  - tag: main
    type: sequence
    args:
      rules:

        # ====================================================================
        # PHASE 0: Server-level pre-processing
        # These were handled by mosdns-x server flags; in lazydns they must be
        # explicit sequence rules.
        # ====================================================================

        # strip_edns0: true  → drop EDNS0 options before processing
        # (requires edns0opt plugin; add here if available in your build)

        # block_ptr: true  → block PTR (reverse DNS) queries (qtype 12)
        - matches:
            - qtype 12
          exec: reject 5  # REFUSED

        # block_https: true  → block HTTPS (type 65) queries
        - matches:
            - qtype 65
          exec: reject 5  # REFUSED

        # block_no_dot: true  → block single-label names (no dot, e.g. "localhost")
        - matches:
            - qname regexp:^[^.]+$
          exec: reject 5  # REFUSED

        # block_aaaa: false  → AAAA queries are NOT blocked (no rule needed)

        # ====================================================================
        # PHASE 1: Policy Enforcement
        # ====================================================================

        # Block private TLDs (.local, .lan, etc.) → NXDOMAIN
        - matches:
            - qname $domain_list_private_tlds
          exec: reject 3  # NXDOMAIN  (mosdns-x: _new_nxdomain_response + _return)

        # Block ads/trackers — unless the domain is explicitly allowlisted
        # (mosdns-x nested if: !allowlisted → if: blocklisted)
        - matches:
            - "!qname $allowlist_domains"
            - qname $blocklist_domains
          exec: black_hole

        # ====================================================================
        # PHASE 2: Local Processing — DNS rewrites
        # ====================================================================

        - exec: dns_redirect

        # ====================================================================
        # PHASE 3: Routing
        # `jump` → execute sub-sequence then return here;
        # `has_resp` guard after each jump exits main if the sub-sequence
        # produced a final response (it called `return` with a valid answer).
        # ====================================================================

        # Route: Google domains → handle_google (with conditional ECS)
        - matches:
            - qname $google_domains
          exec: jump handle_google
        - matches:
            - qname $google_domains
            - has_resp
          exec: return

        # Route: CDN domains → handle_cdn_direct (with ECS)
        - matches:
            - qname $cdn_domains
          exec: jump handle_cdn_direct
        - matches:
            - qname $cdn_domains
            - has_resp
          exec: return

        # Route: Mullvad domains → handle_mullvad
        - matches:
            - qname $mullvad_domains
          exec: jump handle_mullvad
        - matches:
            - qname $mullvad_domains
            - has_resp
          exec: return

        # Route: Everything else → Cloudflare (default)
        - exec: cloudflare_cache
        - exec: upstream_cloudflare
        # Retry once on SERVFAIL
        - matches:
            - rcode 2
          exec: upstream_cloudflare
        # If still SERVFAIL, give up
        - matches:
            - rcode 2
          exec: return

        # ====================================================================
        # PHASE 4: CDN Detection & Re-resolution
        # mosdns-x: single `||` condition → lazydns: separate rules per OR branch
        # (lazydns matchers within one rule are AND; OR requires multiple rules)
        # ====================================================================

        - matches:
            - cname $cdn_domains
          exec: jump handle_cdn_cname

        - matches:
            - resp_ip $cloudfront_ips
          exec: jump handle_cdn_cname

        - matches:
            - resp_ip $fastly_ips
          exec: jump handle_cdn_cname

        - matches:
            - resp_ip $bunnycdn_ips
          exec: jump handle_cdn_cname

        - matches:
            - resp_ip $gcore_ips
          exec: jump handle_cdn_cname

        # Final adjustments for "everything else" (non-CDN Cloudflare responses)
        # NOTE: _limit_2_ips and _no_cname are not available in lazydns.
        # Add a custom plugin here if IP limiting / CNAME stripping is needed.

  # ==========================================================================
  # SERVERS
  # mosdns-x: single `servers:` block with `listeners:` array
  # lazydns: each protocol is a separate plugin
  # Server-level flags (block_ptr, block_https, block_no_dot, strip_edns0,
  # url_path, health_path, redirect_url, allowed_sni) are noted below.
  # NOTE: lazydns doh_server/dot_server/doq_server do not support url_path,
  # health_path, redirect_url, or allowed_sni — implement via a reverse proxy
  # (e.g. nginx/caddy) in front of lazydns if those features are required.
  # ==========================================================================

  # DNS-over-UDP
  - tag: udp_server
    type: udp_server
    args:
      listen: "0.0.0.0:53"
      entry: main

  # DNS-over-TCP
  - tag: tcp_server
    type: tcp_server
    args:
      listen: "0.0.0.0:53"
      entry: main

  # DNS-over-HTTPS (DoH) — port 443
  - tag: doh_server
    type: doh_server
    args:
      listen: "0.0.0.0:443"
      entry: main
      cert_file: "/home/lego/certificates/dns.bibica.net.crt"
      key_file: "/home/lego/certificates/dns.bibica.net.key"

  # DNS-over-TLS (DoT) — port 853
  - tag: dot_server
    type: dot_server
    args:
      listen: "0.0.0.0:853"
      entry: main
      cert_file: "/home/lego/certificates/dns.bibica.net.crt"
      key_file: "/home/lego/certificates/dns.bibica.net.key"

  # DNS-over-QUIC (DoQ) — port 853
  # NOTE: mosdns-x had both DoH3 (HTTP/3) and DoQ on port 853.
  # lazydns only has doq_server; DoH3 is not supported natively.
  - tag: doq_server
    type: doq_server
    args:
      listen: "0.0.0.0:853"
      entry: main
      cert_file: "/home/lego/certificates/dns.bibica.net.crt"
      key_file: "/home/lego/certificates/dns.bibica.net.key"
